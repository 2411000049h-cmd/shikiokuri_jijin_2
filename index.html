<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自陣に質問しようサイト</title>
    <style>
        :root { --accent-color: #333; --sumi: #333; --bg: #fcfcfc; }
        body { font-family: "Yu Mincho", serif; background: var(--bg); color: #222; margin: 0; padding: 20px; line-height: 1.8; }
        .container { max-width: 600px; margin: 0 auto; }
        .section-card { background: #fff; padding: 25px; margin-bottom: 25px; border: 1px solid #e0e0e0; position: relative; }
        .section-card::before { content: ""; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--sumi); }
        h3 { font-size: 0.95rem; margin-bottom: 15px; border-left: 2px solid #ccc; padding-left: 10px; }
        input[type="text"], select { width: 100%; padding: 8px 0; border: none; border-bottom: 1px solid #ccc; font-family: inherit; outline: none; background: transparent; box-sizing: border-box; }
        button { padding: 8px 12px; cursor: pointer; font-size: 0.75rem; background: #fff; border: 1px solid #222; border-radius: 2px; transition: 0.3s; margin: 2px; }
        button:hover { background: #222; color: #fff; }
        .btn-submit { width: 100%; background: #222; color: white; border:none; padding: 15px; font-size: 1.1em; margin-top:15px; }
        .chart-frame { background: #fff; padding: 15px; margin: 30px auto; width: fit-content; border: 8px solid var(--accent-color); transition: border-color 0.4s ease; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        canvas { background: #fff; display: block; max-width: 100%; }
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 1px; background: #ddd; margin: 25px 0; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; background: #fff; border: 1px solid #222; border-radius: 50%; cursor: pointer; }
        .ans-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px dotted #ccc; font-size: 0.9rem; }
        .danger-btn { color: #d93025; border-color: #d93025; }
        .danger-btn:hover { background: #d93025; color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center; font-weight:normal; letter-spacing:0.3em;">四季送り自陣に質問するサイト</h1>
    
<h5>不具合他要望あれば編集追記いたします!!</h5>
    
    <div class="section-card">
        <h3>質問の管理</h3>
        <input id="qTitle" value="お酒は？">
        <label style="font-size:0.7rem;">フレームの色：</label>
        <input type="color" id="fColor" value="#333333" style="width:100%; height:30px;">
        <div style="display:flex; gap:10px; margin-top:10px;">
            <input id="xL" value="嫌い"> <input id="xR" value="好き">
        </div>
        <div style="display:flex; gap:10px;">
            <input id="yB" value="弱い"> <input id="yT" value="強い">
        </div>
        <div style="margin-top:15px; display: flex; flex-wrap: wrap; gap: 5px;">
            <button id="addQ" style="flex: 1;">新規質問を追加</button>
            <button id="updateQ" style="flex: 1;">選択中の質問を更新</button>
            <button id="deleteQ" class="danger-btn" style="flex: 1;">質問を消去</button>
        </div>
    </div>

    <div class="section-card">
        <label>表示中の質問を選択：</label>
        <select id="qSelect"></select>
    </div>

    <div class="section-card">
        <h3 id="formTitle">回答する</h3>
        <div style="display:flex; gap:15px;">
            <input id="uName" placeholder="お名前" style="flex:2">
            <input type="color" id="uColor" value="#666666" style="flex:1; height:35px;">
        </div>
        <div style="margin-top:20px; background:#fafafa; padding:15px;">
            <p id="xlb" style="text-align:center; font-size:0.8rem; font-weight:bold; margin:0;"></p>
            <input type="range" min="1" max="20" id="valX">
            <p id="ylb" style="text-align:center; font-size:0.8rem; font-weight:bold; margin:0;"></p>
            <input type="range" min="1" max="20" id="valY">
            <button id="sendAns" class="btn-submit">回答を送信/上書き</button>
            <button id="cancelEdit" style="display:none; width:100%; margin-top:5px; border-color:#ccc; color:#888;">編集をキャンセル</button>
        </div>
    </div>

    <div class="chart-frame"><canvas id="chart" width="400" height="400"></canvas></div>

    <div class="section-card">
        <h3>回答一覧</h3>
        <div id="ansList"></div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDceh-nvP9lIcKjjo5GdnpYGRZOOws5U7Q",
  authDomain: "shikiokuri-jijin.firebaseapp.com",
  databaseURL: "https://shikiokuri-jijin-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "shikiokuri-jijin",
  storageBucket: "shikiokuri-jijin.firebasestorage.app",
  messagingSenderId: "661663755417",
  appId: "1:661663755417:web:547998312085895e825c08"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const dbRef = ref(db, 'shiki_v3');

let questions = [];
let curIdx = 0;
let editingAnsIdx = null;
const ctx = document.getElementById("chart").getContext("2d");

onValue(dbRef, (snapshot) => {
    const data = snapshot.val();
    questions = data || [];
    renderUI();
});

function renderUI() {
    const sel = document.getElementById("qSelect");
    const lastVal = sel.value;
    sel.innerHTML = "";
    
    if (questions.length === 0) {
        ctx.clearRect(0,0,400,400);
        document.getElementById("ansList").innerHTML = "質問がありません。追加してください。";
        return;
    }

    questions.forEach((q, i) => {
        const opt = document.createElement("option");
        opt.value = i; opt.text = q.title;
        sel.appendChild(opt);
    });

    if (lastVal !== "" && questions[lastVal]) {
        sel.value = lastVal;
    } else {
        sel.value = 0;
    }
    curIdx = Number(sel.value);
    draw();
    renderList();
}

function draw() {
    if (!questions[curIdx]) return;
    const q = questions[curIdx];
    
    document.documentElement.style.setProperty('--accent-color', q.frameColor);
    document.getElementById("xlb").innerText = q.xL + " ↔ " + q.xR;
    document.getElementById("ylb").innerText = q.yB + " ↔ " + q.yT;

    ctx.clearRect(0,0,400,400);
    
    // 軸の描画
    ctx.strokeStyle = "#ddd"; 
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(50, 200); ctx.lineTo(350, 200); // 横軸
    ctx.moveTo(200, 50); ctx.lineTo(200, 350); // 縦軸
    ctx.stroke();

    // 内部ラベルの描画
    ctx.fillStyle = "#888";
    ctx.font = "12px serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    // 四方のラベル
    ctx.fillText(q.xL, 30, 200);  // 左
    ctx.fillText(q.xR, 370, 200); // 右
    ctx.fillText(q.yT, 200, 30);  // 上
    ctx.fillText(q.yB, 200, 370); // 下

    // 回答データの描画
    (q.answers || []).forEach(a => {
        const px = 50 + (a.x - 1) * (300 / 19);
        const py = 50 + (21 - a.y) * (300 / 19);
        ctx.fillStyle = a.color;
        ctx.beginPath();
        ctx.arc(px, py, 7, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "white";
        ctx.lineWidth = 2;
        ctx.stroke();

        // 名前
        ctx.fillStyle = "#222";
        ctx.font = "10px sans-serif";
        ctx.fillText(a.name, px, py - 12);
    });

    // 中央の質問タイトル
    const tw = ctx.measureText(q.title).width;
    ctx.fillStyle = "rgba(255, 255, 255, 0.9)";
    ctx.fillRect(200 - (tw / 2) - 10, 188, tw + 20, 24);
    ctx.fillStyle = "#222";
    ctx.font = "bold 15px serif";
    ctx.fillText(q.title, 200, 200);
}

function renderList() {
    const list = document.getElementById("ansList");
    list.innerHTML = "";
    if (!questions[curIdx] || !questions[curIdx].answers || questions[curIdx].answers.length === 0) {
        list.innerHTML = "まだ回答がありません。";
        return;
    }
    questions[curIdx].answers.forEach((a, i) => {
        const div = document.createElement("div");
        div.className = "ans-item";
        div.innerHTML = `<span><b style="color:${a.color}">●</b> ${a.name}</span>
            <div>
                <button onclick="window.editAns(${i})">編集</button>
                <button onclick="window.deleteAns(${i})" class="danger-btn">消去</button>
            </div>`;
        list.appendChild(div);
    });
}

document.getElementById("addQ").onclick = () => {
    const newQ = {
        title: document.getElementById("qTitle").value,
        frameColor: document.getElementById("fColor").value,
        xL: document.getElementById("xL").value, xR: document.getElementById("xR").value,
        yB: document.getElementById("yB").value, yT: document.getElementById("yT").value,
        answers: []
    };
    questions.push(newQ);
    set(dbRef, questions);
};

document.getElementById("updateQ").onclick = () => {
    if (questions.length === 0) return;
    questions[curIdx].title = document.getElementById("qTitle").value;
    questions[curIdx].frameColor = document.getElementById("fColor").value;
    questions[curIdx].xL = document.getElementById("xL").value;
    questions[curIdx].xR = document.getElementById("xR").value;
    questions[curIdx].yB = document.getElementById("yB").value;
    questions[curIdx].yT = document.getElementById("yT").value;
    set(dbRef, questions);
    alert("更新しました");
};

document.getElementById("deleteQ").onclick = () => {
    if (questions.length === 0) return;
    if (!confirm(`質問を削除しますか？`)) return;
    questions.splice(curIdx, 1);
    set(dbRef, questions);
};

document.getElementById("sendAns").onclick = () => {
    const name = document.getElementById("uName").value.trim();
    if (!name || questions.length === 0) return alert("名前を入力してください");
    if (!questions[curIdx].answers) questions[curIdx].answers = [];
    
    const newAns = {
        name, color: document.getElementById("uColor").value,
        x: Number(document.getElementById("valX").value),
        y: Number(document.getElementById("valY").value)
    };

    if (editingAnsIdx !== null) {
        questions[curIdx].answers[editingAnsIdx] = newAns;
        editingAnsIdx = null;
        document.getElementById("formTitle").innerText = "回答する";
        document.getElementById("cancelEdit").style.display = "none";
    } else {
        questions[curIdx].answers.push(newAns);
    }
    set(dbRef, questions);
};

window.editAns = (i) => {
    const a = questions[curIdx].answers[i];
    document.getElementById("uName").value = a.name;
    document.getElementById("uColor").value = a.color;
    document.getElementById("valX").value = a.x;
    document.getElementById("valY").value = a.y;
    editingAnsIdx = i;
    document.getElementById("formTitle").innerText = "回答を修正中...";
    document.getElementById("cancelEdit").style.display = "block";
    window.scrollTo(0, 400);
};

window.deleteAns = (i) => {
    if (!confirm("削除しますか？")) return;
    questions[curIdx].answers.splice(i, 1);
    set(dbRef, questions);
};

document.getElementById("cancelEdit").onclick = () => {
    editingAnsIdx = null;
    document.getElementById("formTitle").innerText = "回答する";
    document.getElementById("cancelEdit").style.display = "none";
};

document.getElementById("qSelect").onchange = (e) => {
    curIdx = Number(e.target.value);
    const q = questions[curIdx];
    document.getElementById("qTitle").value = q.title;
    document.getElementById("fColor").value = q.frameColor;
    document.getElementById("xL").value = q.xL;
    document.getElementById("xR").value = q.xR;
    document.getElementById("yB").value = q.yB;
    document.getElementById("yT").value = q.yT;
    draw();
    renderList();
};
</script>
</body>
</html>
