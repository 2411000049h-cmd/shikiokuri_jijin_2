<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>四季送り自陣に質問しようサイト</title>
    <style>
        :root { --main: #222; --bg: #fcfcfc; }
        body { font-family: "Yu Mincho", serif; background: var(--bg); color: var(--main); margin: 0; padding: 20px; line-height: 1.6; }
        .container { max-width: 700px; margin: 0 auto; }
        
        /* 質問作成エリア */
        .admin-panel { background: #fff; border: 2px solid var(--main); padding: 20px; margin-bottom: 50px; }
        .input-row { display: flex; gap: 10px; margin-bottom: 10px; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; box-sizing: border-box; font-family: inherit; }
        button { cursor: pointer; border: 1px solid var(--main); background: #fff; transition: 0.2s; font-family: inherit; }
        button:hover { background: var(--main); color: #fff; }
        .btn-add { width: 100%; padding: 15px; font-weight: bold; font-size: 1rem; }

        /* 質問カード（これがどんどん増える） */
        .q-card { background: #fff; border: 1px solid #ddd; padding: 25px; margin-bottom: 60px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .q-title { text-align: center; font-size: 1.4rem; margin-bottom: 20px; border-bottom: 2px solid var(--main); display: inline-block; width: 100%; }
        
        /* チャートエリア */
        .chart-box { position: relative; width: 450px; height: 450px; margin: 0 auto 30px; background: #fff; border: 8px solid var(--f-color); }
        @media (max-width: 500px) { .chart-box { width: 300px; height: 300px; } }
        canvas { width: 100%; height: 100%; display: block; }

        /* 回答フォームエリア */
        .ans-form { background: #f9f9f9; padding: 20px; border-top: 1px solid #eee; }
        .ans-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .range-box { text-align: center; font-size: 0.8rem; font-weight: bold; }
        .danger-text { color: red; cursor: pointer; font-size: 0.7rem; text-decoration: underline; margin-top: 10px; display: block; text-align: right; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center; letter-spacing: 0.2em;">四季送り自陣 質問板</h1>

    <div class="admin-panel">
        <h3>新しい質問を作成</h3>
        <input id="new_title" placeholder="質問内容（例：お酒の強さと好き度）" style="margin-bottom:15px;">
        <div class="input-row">
            <input id="new_xL" placeholder="左（嫌い）">
            <input id="new_xR" placeholder="右（好き）">
        </div>
        <div class="input-row">
            <input id="new_yB" placeholder="下（弱い）">
            <input id="new_yT" placeholder="上（強い）">
        </div>
        <input type="color" id="new_fColor" value="#333333" style="height:40px; cursor:pointer;">
        <button id="addQBtn" class="btn-add" style="margin-top:10px;">質問を追加する</button>
    </div>

    <hr style="margin: 50px 0; border: none; border-top: 3px double #333;">

    <div id="qContainer"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyDceh-nvP9lIcKjjo5GdnpYGRZOOws5U7Q",
    authDomain: "shikiokuri-jijin.firebaseapp.com",
    databaseURL: "https://shikiokuri-jijin-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "shikiokuri-jijin",
    storageBucket: "shikiokuri-jijin.firebasestorage.app",
    messagingSenderId: "661663755417",
    appId: "1:661663755417:web:547998312085895e825c08"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const dbRef = ref(db, 'shiki_v5'); // データ形式刷新

let questions = [];
let localImageData = null;

// 画像の読み込み
window.handleFile = (input) => {
    const file = input.files[0];
    const reader = new FileReader();
    reader.onload = (e) => { localImageData = e.target.result; };
    reader.readAsDataURL(file);
};

onValue(dbRef, (snapshot) => {
    questions = snapshot.val() || [];
    renderCards();
});

function renderCards() {
    const container = document.getElementById("qContainer");
    container.innerHTML = "";

    questions.forEach((q, qIdx) => {
        const card = document.createElement("div");
        card.className = "q-card";
        card.innerHTML = `
            <div class="q-title">${q.title}</div>
            <div class="chart-box" style="--f-color: ${q.frameColor}">
                <canvas id="can-${qIdx}" width="450" height="450"></canvas>
            </div>
            <div class="ans-form">
                <div class="ans-grid">
                    <input id="name-${qIdx}" placeholder="お名前">
                    <input type="file" onchange="handleFile(this)" accept="image/*">
                </div>
                <div class="range-box">
                    <div>${q.xL} ← (横) → ${q.xR}</div>
                    <input type="range" id="x-${qIdx}" min="1" max="100" value="50">
                    <div style="margin-top:10px;">${q.yB} ← (縦) → ${q.yT}</div>
                    <input type="range" id="y-${qIdx}" min="1" max="100" value="50">
                </div>
                <button onclick="sendAnswer(${qIdx})" style="width:100%; margin-top:15px; padding:10px; background:#222; color:#fff;">この質問に回答する</button>
                <span class="danger-text" onclick="deleteQuestion(${qIdx})">この質問カードを削除する</span>
            </div>
        `;
        container.appendChild(card);
        drawChart(qIdx);
    });
}

async function drawChart(idx) {
    const q = questions[idx];
    const canvas = document.getElementById(`can-${idx}`);
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0,0,450,450);

    // 軸
    ctx.strokeStyle = "#eee"; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(50,225); ctx.lineTo(400,225); ctx.moveTo(225,50); ctx.lineTo(225,400); ctx.stroke();

    // 項目名（好き・嫌いなど）
    ctx.fillStyle = "#888"; ctx.font = "bold 13px serif"; ctx.textAlign="center";
    ctx.fillText(q.xL, 25, 225); ctx.fillText(q.xR, 425, 225);
    ctx.fillText(q.yT, 225, 25); ctx.fillText(q.yB, 225, 435);

    if(!q.answers) return;
    for(const a of q.answers) {
        const px = 50 + (a.x / 100) * 350;
        const py = 50 + ((100 - a.y) / 100) * 350;
        const size = 60; // 固定の大きなサイズ

        if(a.img) {
            const img = new Image();
            img.src = a.img;
            await new Promise(r => img.onload = r);
            ctx.save();
            ctx.beginPath(); ctx.arc(px, py, size/2, 0, Math.PI*2); ctx.clip();
            ctx.drawImage(img, px - size/2, py - size/2, size, size);
            ctx.restore();
            ctx.strokeStyle = "#333"; ctx.lineWidth = 2; ctx.stroke();
        } else {
            ctx.fillStyle = "#333"; ctx.beginPath(); ctx.arc(px, py, 10, 0, Math.PI*2); ctx.fill();
        }
        ctx.fillStyle = "#000"; ctx.font = "bold 11px sans-serif";
        ctx.fillText(a.name, px, py + (size/2) + 12);
    }
}

// 質問追加
document.getElementById("addQBtn").onclick = () => {
    const title = document.getElementById("new_title").value;
    if(!title) return;
    questions.push({
        title, frameColor: document.getElementById("new_fColor").value,
        xL: document.getElementById("new_xL").value || "左",
        xR: document.getElementById("new_xR").value || "右",
        yT: document.getElementById("new_yT").value || "上",
        yB: document.getElementById("new_yB").value || "下",
        answers: []
    });
    set(dbRef, questions);
    document.getElementById("new_title").value = "";
};

// 回答送信
window.sendAnswer = (idx) => {
    const name = document.getElementById(`name-${idx}`).value;
    if(!name) return alert("お名前を入力してください");
    
    if(!questions[idx].answers) questions[idx].answers = [];
    const existing = questions[idx].answers.findIndex(a => a.name === name);
    
    const data = {
        name,
        x: Number(document.getElementById(`x-${idx}`).value),
        y: Number(document.getElementById(`y-${idx}`).value),
        img: localImageData
    };

    if(existing > -1) questions[idx].answers[existing] = data;
    else questions[idx].answers.push(data);
    
    set(dbRef, questions);
    localImageData = null; // リセット
};

// 質問削除
window.deleteQuestion = (idx) => {
    if(confirm("この質問を完全に削除しますか？")) {
        questions.splice(idx, 1);
        set(dbRef, questions);
    }
};
</script>
</body>
</html>
