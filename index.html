<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>四季送り自陣に質問するサイト</title>
    <style>
        :root { --main: #222; --sub: #f0f0f0; }
        body { font-family: "Yu Mincho", serif; background: #fafafa; color: var(--main); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        
        /* 管理・回答エリア（固定） */
        .sticky-panel { background: #fff; border: 2px solid var(--main); padding: 20px; margin-bottom: 40px; position: sticky; top: 10px; z-index: 100; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .panel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 600px) { .panel-grid { grid-template-columns: 1fr; } }
        
        h2, h3 { border-bottom: 1px solid #ccc; padding-bottom: 5px; margin-top: 0; font-size: 1.1rem; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ccc; margin-bottom: 10px; box-sizing: border-box; }
        
        button { cursor: pointer; padding: 10px; border: 1px solid var(--main); background: #fff; transition: 0.2s; }
        button:hover { background: var(--main); color: #fff; }
        .btn-main { background: var(--main); color: #fff; width: 100%; font-weight: bold; }
        
        /* チャート一覧エリア */
        .chart-list-title { text-align: center; border-top: 3px double #333; padding-top: 40px; margin-top: 40px; letter-spacing: 0.5em; }
        .q-card { background: #fff; border: 1px solid #ddd; padding: 20px; margin-bottom: 50px; text-align: center; }
        .chart-container { position: relative; width: 500px; height: 500px; margin: 20px auto; background: #fff; border: 5px solid var(--border-color, #333); }
        @media (max-width: 550px) { .chart-container { width: 320px; height: 320px; } }
        canvas { width: 100%; height: 100%; }

        /* 画像アップロード関連 */
        .img-preview { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 1px solid #ccc; display: block; margin: 10px 0; }
        .danger { color: #d93025; border-color: #d93025; font-size: 0.7rem; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center;">質問管理</h1>

    <div class="sticky-panel">
        <div class="panel-grid">
            <div>
                <h3>1. 新しい質問を作る</h3>
                <input id="qTitle" placeholder="例：お酒は好き？">
                <div style="display:flex; gap:5px;">
                    <input id="xL" placeholder="左（嫌い）" style="flex:1">
                    <input id="xR" placeholder="右（好き）" style="flex:1">
                </div>
                <div style="display:flex; gap:5px;">
                    <input id="yB" placeholder="下（弱い）" style="flex:1">
                    <input id="yT" placeholder="上（強い）" style="flex:1">
                </div>
                <input type="color" id="fColor" value="#333333" title="フレームの色">
                <button id="addQ" class="btn-main">この質問を追加して公開</button>
            </div>

            <div>
                <h3>2. 選んで回答する</h3>
                <select id="qSelect"></select>
                <div style="display:flex; gap:10px; align-items: center;">
                    <input id="uName" placeholder="自分の名前" style="flex:2">
                    <input type="color" id="uColor" value="#666666" style="flex:1" title="アイコン色">
                </div>
                
                <label style="font-size:0.7rem;">画像を使う(丸く切り抜かれます):</label>
                <input type="file" id="uImg" accept="image/*">
                <img id="preview" class="img-preview" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
                
                <div style="font-size:0.8rem; background:#f9f9f9; padding:10px; border:1px solid #eee;">
                    X軸: <input type="range" id="valX" min="1" max="100" value="50">
                    Y軸: <input type="range" id="valY" min="1" max="100" value="50">
                    ｻｲｽﾞ: <input type="range" id="valSize" min="20" max="80" value="50">
                </div>
                <button id="sendAns" class="btn-main" style="margin-top:10px;">チャートに反映</button>
                <button id="delQ" class="danger">選択中の質問自体を消す</button>
            </div>
        </div>
    </div>

    <h2 class="chart-list-title">CHARTS</h2>
    <div id="chartList"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyDceh-nvP9lIcKjjo5GdnpYGRZOOws5U7Q",
    authDomain: "shikiokuri-jijin.firebaseapp.com",
    databaseURL: "https://shikiokuri-jijin-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "shikiokuri-jijin",
    storageBucket: "shikiokuri-jijin.firebasestorage.app",
    messagingSenderId: "661663755417",
    appId: "1:661663755417:web:547998312085895e825c08"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const dbRef = ref(db, 'shiki_v4'); // 互換性のためにバージョンを上げる

let questions = [];
let userImageData = null;

// 画像の処理
document.getElementById('uImg').onchange = (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (event) => {
        userImageData = event.target.result; // Base64
        document.getElementById('preview').src = userImageData;
    };
    reader.readAsDataURL(file);
};

onValue(dbRef, (snapshot) => {
    questions = snapshot.val() || [];
    updateUI();
});

function updateUI() {
    const sel = document.getElementById("qSelect");
    const container = document.getElementById("chartList");
    const curSel = sel.value;
    
    sel.innerHTML = "";
    container.innerHTML = "";

    questions.forEach((q, i) => {
        // セレクトボックス更新
        const opt = document.createElement("option");
        opt.value = i; opt.text = q.title;
        sel.appendChild(opt);

        // チャートカード作成
        const card = document.createElement("div");
        card.className = "q-card";
        card.innerHTML = `<h3>${q.title}</h3>
            <div class="chart-container" style="--border-color: ${q.frameColor}">
                <canvas id="canvas-${i}" width="500" height="500"></canvas>
            </div>`;
        container.appendChild(card);
        drawChart(i);
    });
    if(questions[curSel]) sel.value = curSel;
}

async function drawChart(idx) {
    const q = questions[idx];
    const canvas = document.getElementById(`canvas-${idx}`);
    if(!canvas) return;
    const ctx = canvas.getContext("2d");
    
    ctx.clearRect(0,0,500,500);
    
    // 軸
    ctx.strokeStyle = "#ccc";
    ctx.beginPath(); ctx.moveTo(50,250); ctx.lineTo(450,250); ctx.moveTo(250,50); ctx.lineTo(250,450); ctx.stroke();
    
    // ラベル
    ctx.fillStyle = "#999"; ctx.font = "14px serif"; ctx.textAlign="center";
    ctx.fillText(q.xL, 30, 255); ctx.fillText(q.xR, 470, 255);
    ctx.fillText(q.yT, 250, 30); ctx.fillText(q.yB, 250, 480);

    if(!q.answers) return;

    for (const a of q.answers) {
        const px = 50 + (a.x / 100) * 400;
        const py = 50 + ( (100 - a.y) / 100) * 400;
        const size = a.size || 50;

        if (a.img) {
            const img = new Image();
            img.src = a.img;
            await new Promise(r => img.onload = r);
            
            ctx.save();
            ctx.beginPath();
            ctx.arc(px, py, size/2, 0, Math.PI*2);
            ctx.clip();
            ctx.drawImage(img, px - size/2, py - size/2, size, size);
            ctx.restore();
            // 枠
            ctx.strokeStyle = a.color; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.arc(px, py, size/2, 0, Math.PI*2); ctx.stroke();
        } else {
            ctx.fillStyle = a.color;
            ctx.beginPath(); ctx.arc(px, py, size/4, 0, Math.PI*2); ctx.fill();
        }
        
        ctx.fillStyle = "#222"; ctx.font = "bold 12px sans-serif";
        ctx.fillText(a.name, px, py + (size/2) + 15);
    }
}

// 質問追加
document.getElementById("addQ").onclick = () => {
    const title = document.getElementById("qTitle").value;
    if(!title) return;
    questions.push({
        title, frameColor: document.getElementById("fColor").value,
        xL: document.getElementById("xL").value || "左",
        xR: document.getElementById("xR").value || "右",
        yT: document.getElementById("yT").value || "上",
        yB: document.getElementById("yB").value || "下",
        answers: []
    });
    set(dbRef, questions);
};

// 回答送信
document.getElementById("sendAns").onclick = () => {
    const idx = document.getElementById("qSelect").value;
    const name = document.getElementById("uName").value;
    if(!name || idx === "") return alert("名前と質問を選んでください");

    if(!questions[idx].answers) questions[idx].answers = [];
    
    // 同名がいれば上書き、いなければ新規
    const existing = questions[idx].answers.findIndex(a => a.name === name);
    const data = {
        name, 
        color: document.getElementById("uColor").value,
        x: Number(document.getElementById("valX").value),
        y: Number(document.getElementById("valY").value),
        size: Number(document.getElementById("valSize").value),
        img: userImageData // 画像データ（なければnull）
    };

    if(existing > -1) questions[idx].answers[existing] = data;
    else questions[idx].answers.push(data);

    set(dbRef, questions);
};

// 質問削除
document.getElementById("delQ").onclick = () => {
    const idx = document.getElementById("qSelect").value;
    if(idx === "" || !confirm("この質問と全員の回答を削除しますか？")) return;
    questions.splice(idx, 1);
    set(dbRef, questions);
};
</script>
</body>
</html>
